<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Topbar Oficial — Vet System Control | Equine</title>
  <style>
    :root{
      --vsc-green:#2fb26a;--vsc-green-dark:#1f7a4a;--vsc-border:#e8e8e8;--vsc-bg:#ffffff;--vsc-text:#111827;--vsc-muted:#6b7280;--vsc-danger:#dc2626;--vsc-topbar-h:94px;--vsc-mobile-h:64px;
    }
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:var(--vsc-topbar-h);overflow:hidden;background:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--vsc-text)}
    body{border-bottom:1px solid var(--vsc-border)}
    .vsc-topbar{height:var(--vsc-topbar-h);background:linear-gradient(180deg,#fff,#f6fbf8);display:flex;align-items:center;padding:0 14px;gap:12px;width:100%;box-shadow:0 10px 28px rgba(15,23,42,.07)}
    .vsc-topbar__brand{display:flex;align-items:center;justify-content:flex-start;min-width:170px;flex:0 1 190px;min-height:68px}.vsc-topbar__brand img{display:block;height:60px;width:auto;max-width:100%;object-fit:contain;pointer-events:none;user-select:none}
    .vsc-topbar__navwrap{flex:1 1 auto;display:flex;align-items:center;justify-content:center;min-width:0}.vsc-topbar__nav{display:flex;align-items:center;justify-content:center;gap:10px;white-space:nowrap;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;padding:4px 0 4px;margin:0 auto;min-width:0;max-width:100%}.vsc-topbar__nav::-webkit-scrollbar{display:none}
    .vsc-topbar__nav a,.vsc-mobile-drawer__list a{font-size:13px;font-weight:900;padding:12px 14px;border-radius:999px;color:#173424;text-decoration:none;border:1px solid transparent;line-height:1;transition:all .15s ease;display:inline-flex;align-items:center;justify-content:center;min-height:42px}
    .vsc-topbar__nav a:hover,.vsc-mobile-drawer__list a:hover{background:rgba(47,178,106,.10);border-color:rgba(47,178,106,.14)}
    .vsc-topbar__nav a.is-active,.vsc-mobile-drawer__list a.is-active{background:linear-gradient(180deg,#e8f7ee,#dff1e7);color:var(--vsc-green-dark);box-shadow:inset 0 0 0 1px rgba(31,122,74,.10),0 8px 18px rgba(47,178,106,.10)}
    .vsc-topbar__right{min-width:0;flex:0 1 250px;display:flex;align-items:center;justify-content:flex-end;gap:8px;min-height:72px}.vsc-logo-a{display:none;height:58px;width:auto;max-width:180px;object-fit:contain;border:0;background:transparent;user-select:none}
    .vsc-sync{display:flex;align-items:center;gap:10px;flex:0 0 auto}.vsc-sync__btn{appearance:none;border:1px solid rgba(47,178,106,.18);background:rgba(47,178,106,.10);color:var(--vsc-green-dark);font-weight:800;font-size:12px;padding:10px 12px;border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:0;line-height:1;white-space:nowrap;min-width:42px;justify-content:center}.vsc-sync__btn:hover{background:rgba(47,178,106,.14)}.vsc-sync__btn:disabled{opacity:.55;cursor:not-allowed}.vsc-sync__icon{font-size:14px}.vsc-sync__meta{display:flex;align-items:center;gap:6px;font-weight:900;font-size:12px;color:#111;padding:0 4px}.vsc-sync__dot{width:10px;height:10px;border-radius:999px;background:var(--vsc-danger);box-shadow:0 0 0 2px rgba(0,0,0,.06) inset}.vsc-sync__pending{min-width:18px;text-align:right;font-variant-numeric:tabular-nums}
    .vsc-userbox{display:flex;align-items:center;gap:6px;padding:6px 7px 6px 12px;border:1px solid rgba(0,0,0,.08);border-radius:999px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.04);min-width:0;max-width:170px;flex:0 1 auto}.vsc-userbox__meta{display:flex;flex-direction:column;min-width:0;line-height:1.1}.vsc-userbox__label{display:none;font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--vsc-muted)}.vsc-userbox__name{font-size:12px;font-weight:900;color:var(--vsc-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:76px}.vsc-userbox__role{display:none;font-size:11px;font-weight:700;color:var(--vsc-green-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}.vsc-logout-btn{appearance:none;border:1px solid rgba(17,24,39,.12);background:#fff;color:var(--vsc-text);font-weight:900;font-size:12px;padding:9px 10px;border-radius:999px;cursor:pointer;line-height:1;white-space:nowrap;transition:background .15s ease,border-color .15s ease,transform .15s ease;min-width:38px}.vsc-logout-btn:hover{background:#f9fafb;border-color:rgba(17,24,39,.22)}.vsc-logout-btn:active{transform:translateY(1px)}.vsc-logout-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .vsc-mobile-toggle{display:none;appearance:none;border:1px solid rgba(17,24,39,.12);background:#fff;color:#111827;border-radius:14px;min-width:44px;height:44px;font-size:20px;font-weight:900;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .vsc-mobile-drawer{display:none;background:#fff;border-top:1px solid var(--vsc-border);padding:10px 14px 16px}.vsc-mobile-drawer__list{display:grid;grid-template-columns:1fr 1fr;gap:8px}.vsc-mobile-drawer__meta{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding-top:10px}
    .vsc-mobile-chip{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(47,178,106,.18);background:rgba(47,178,106,.10);color:var(--vsc-green-dark);border-radius:999px;padding:10px 12px;font-size:12px;font-weight:900}.vsc-mobile-chip strong{font-variant-numeric:tabular-nums}
    body.mobile-open{height:auto;overflow:auto}.mobile-open .vsc-mobile-drawer{display:block}
    @media (max-width:900px){
      html,body{height:var(--vsc-mobile-h)}
      body.mobile-open{height:auto;min-height:var(--vsc-mobile-h)}
      .vsc-topbar{height:var(--vsc-mobile-h);padding:0 10px;gap:8px}
      .vsc-topbar__brand{min-width:0;flex:1 1 auto;min-height:44px}.vsc-topbar__brand img{height:36px;max-width:220px}
      .vsc-topbar__navwrap,.vsc-logo-a,.vsc-userbox__role,.vsc-userbox__label,.vsc-sync__meta{display:none}
      .vsc-topbar__right{flex:0 0 auto;min-height:auto;gap:6px}.vsc-userbox{padding:4px 6px 4px 10px;max-width:120px}.vsc-userbox__name{max-width:56px}.vsc-sync__btn,.vsc-logout-btn{min-width:40px;height:40px;padding:0 10px}
      .vsc-mobile-toggle{display:inline-flex}
    }
  </style>
</head>
<body>
  <header class="vsc-topbar">
    <div class="vsc-topbar__brand">
      <button class="vsc-mobile-toggle" id="vscMobileToggle" type="button" aria-label="Abrir menu">☰</button>
      <img id="vscLogoSistema" src="assets/brand/vsc-logo-horizontal.png" alt="Vet System Control | Equine" />
    </div>
    <div class="vsc-topbar__navwrap">
      <nav class="vsc-topbar__nav" id="vscTopbarNav" aria-label="Navegação principal">
        <a href="dashboard.html" data-route="dashboard" data-clean-href="/dashboard">Dashboard</a>
        <a href="clientes.html" data-route="clientes" data-clean-href="/clientes">Clientes</a>
        <a href="animais.html" data-route="animais" data-clean-href="/animais">Animais</a>
        <a href="reproducao_equina.html" data-route="reproducao_equina" data-clean-href="/reproducao_equina">Reprodução</a>
        <a href="atendimentos.html" data-route="atendimentos" data-clean-href="/atendimentos">Atendimentos</a>
        <a href="produtos.html" data-route="produtos" data-clean-href="/produtos">Produtos</a>
        <a href="empresa.html" data-route="empresa" data-clean-href="/empresa">Empresa</a>
      </nav>
    </div>
    <div class="vsc-topbar__right">
      <div class="vsc-sync" id="vscSyncWidget" aria-label="Sincronização">
        <button class="vsc-sync__btn" id="vscSyncBtn" type="button" title="Sincronizar agora"><span class="vsc-sync__icon" aria-hidden="true">⟳</span></button>
        <div class="vsc-sync__meta" title="Status de rede e fila de alterações"><span class="vsc-sync__dot" id="vscNetDot" aria-hidden="true"></span><span class="vsc-sync__pending" id="vscSyncPending">0</span></div>
      </div>
      <div class="vsc-userbox" id="vscUserBox" aria-live="polite"><div class="vsc-userbox__meta"><span class="vsc-userbox__label">Sessão ativa</span><span class="vsc-userbox__name" id="vscCurrentUserName">Não autenticado</span><span class="vsc-userbox__role" id="vscCurrentUserRole">Sem sessão</span></div><button class="vsc-logout-btn" id="vscLogoutBtn" type="button" title="Encerrar sessão com segurança">⎋</button></div>
      <img id="vscLogoACliente" class="vsc-logo-a" alt="Logo A da empresa" />
    </div>
  </header>
  <section class="vsc-mobile-drawer" id="vscMobileDrawer" aria-label="Menu móvel">
    <nav class="vsc-mobile-drawer__list" id="vscMobileNav">
      <a href="dashboard.html" data-route="dashboard" data-clean-href="/dashboard">Dashboard</a>
      <a href="clientes.html" data-route="clientes" data-clean-href="/clientes">Clientes</a>
      <a href="animais.html" data-route="animais" data-clean-href="/animais">Animais</a>
      <a href="reproducao_equina.html" data-route="reproducao_equina" data-clean-href="/reproducao_equina">Reprodução</a>
      <a href="atendimentos.html" data-route="atendimentos" data-clean-href="/atendimentos">Atendimentos</a>
      <a href="produtos.html" data-route="produtos" data-clean-href="/produtos">Produtos</a>
      <a href="empresa.html" data-route="empresa" data-clean-href="/empresa">Empresa</a>
    </nav>
    <div class="vsc-mobile-drawer__meta">
      <div class="vsc-mobile-chip"><span>Fila</span><strong id="vscMobilePending">0</strong></div>
      <button class="vsc-sync__btn" id="vscMobileSyncBtn" type="button">Sincronizar</button>
      <button class="vsc-logout-btn" id="vscMobileLogoutBtn" type="button">Sair</button>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="modules/vsc_db.js"></script>
  <script src="modules/vsc-cloud-sync.js"></script>
  <script src="modules/vsc-outbox-relay.js"></script>
  <script src="modules/vsc-attachments-relay.js"></script>
  <script src="modules/vsc-sync-ui.js"></script>
  <script src="modules/auth.js" charset="utf-8"></script>
  <script src="modules/auth_guard.js" charset="utf-8"></script>
  <script src="modules/ui-global.js?v=20260307f"></script>
  <script>
    (function(){
      "use strict";
      var EMPRESA_KEY="vsc_empresa_v1",LOGOUT_FLAG_KEY="vsc_logout_in_progress",LOGIN_TARGET="login.html?logout=1",LOGIN_TARGET_CLEAN="/login?logout=1",MOBILE_H=64,DESKTOP_H=94;
      function getTopWindow(){ try{ if(window.top&&window.top!==window) return window.top; }catch(_){ } return window; }
      function getScopedStorage(name){ try{ var tw=getTopWindow(); if(tw&&tw[name]) return tw[name]; }catch(_){ } try{ return window[name]||null; }catch(_){ return null; } }
      function getTopSessionStorage(){ return getScopedStorage("sessionStorage"); }
      function getTopLocalStorage(){ return getScopedStorage("localStorage"); }
      function setLogoutInProgress(){ try{ var ss=getTopSessionStorage(); if(ss) ss.setItem(LOGOUT_FLAG_KEY,String(Date.now())); }catch(_){ } }
      function clearLogoutInProgress(){ try{ var ss=getTopSessionStorage(); if(ss) ss.removeItem(LOGOUT_FLAG_KEY); }catch(_){ } }
      function normalizeFile(pathname){ var p=String(pathname||"").split("?")[0].split("#")[0]; p=p.replace(/\\+/g,'/'); p=p.substring(p.lastIndexOf("/")+1); p=p.replace(/\.html$/i,'').replace(/\/$/,''); return p||"dashboard"; }
      function isPagesHost(){ try{ var h=String(getTopWindow().location.hostname||location.hostname||'').toLowerCase(); return h==='app.vetsystemcontrol.com.br'||h==='www.vetsystemcontrol.com.br'; }catch(_){ var h2=String(location.hostname||'').toLowerCase(); return h2==='app.vetsystemcontrol.com.br'||h2==='www.vetsystemcontrol.com.br'; } }
      function getCanonicalHref(el){ if(!el) return null; return (isPagesHost() && el.getAttribute('data-clean-href')) || el.getAttribute('href'); }
      function syncActive(route){ [document.getElementById('vscTopbarNav'),document.getElementById('vscMobileNav')].forEach(function(nav){ if(!nav) return; nav.querySelectorAll('a[data-route]').forEach(function(a){ a.classList.toggle('is-active', normalizeFile(a.getAttribute('data-route')||a.getAttribute('href')||'')===route); }); }); }
      function setActiveFromCurrentContext(){ var route='dashboard'; try{ route=normalizeFile(getTopWindow().location.pathname||""); }catch(_){ route=normalizeFile(location.pathname||""); } syncActive(route); }
      function navigateTop(href){ try{ getTopWindow().location.href=href; }catch(_){ location.href=href; } }
      function upgradeCanonicalLinks(){ var clean=isPagesHost(); document.querySelectorAll('a[data-route]').forEach(function(a){ var href=clean ? (a.getAttribute('data-clean-href')||a.getAttribute('href')) : a.getAttribute('href'); if(href) a.setAttribute('href', href); }); }
      function wireNav(nav){ if(!nav) return; nav.addEventListener('click', function(ev){ var el=ev.target; while(el&&el!==nav&&(!el.tagName||el.tagName.toLowerCase()!=='a')) el=el.parentNode; if(!el||el===nav) return; var href=getCanonicalHref(el); if(!href) return; ev.preventDefault(); navigateTop(href); closeMenu(); }); }
      function safeParse(v){ try{ return JSON.parse(v); }catch(_){ return null; } }
      async function loadLogoA(){ var img=document.getElementById('vscLogoACliente'); if(!img) return; try{ var src=''; var db=(window.VSC_DB||getTopWindow().VSC_DB||null); if(db&&typeof db.getEmpresaSnapshot==='function'){ var empresa=await db.getEmpresaSnapshot({ preferIdb:true, hydrateLocalStorage:true }); src=empresa&&typeof empresa.__logoA==='string'?empresa.__logoA:''; } if(!src){ var raw=getTopLocalStorage()?getTopLocalStorage().getItem(EMPRESA_KEY):localStorage.getItem(EMPRESA_KEY); var obj=safeParse(raw); src=obj&&typeof obj.__logoA==='string'?obj.__logoA:''; } if(src&&src.indexOf('data:image/')===0){ img.src=src; img.style.display='block'; } else { img.removeAttribute('src'); img.style.display='none'; } }catch(_){ img.removeAttribute('src'); img.style.display='none'; } }
      function getAuthApi(){ try{ var tw=getTopWindow(); if(tw&&tw.VSC_AUTH) return tw.VSC_AUTH; }catch(_){ } try{ if(window.VSC_AUTH) return window.VSC_AUTH; }catch(_){ } try{ if(window.Auth) return window.Auth; }catch(_){ } return null; }
      async function getCurrentUserSafe(){ var auth=getAuthApi(); if(!auth) return null; try{ if(typeof auth.bootstrap==='function') await auth.bootstrap(); }catch(_){ } try{ if(typeof auth.getCurrentUser==='function') return await auth.getCurrentUser(); }catch(_){ } try{ if(typeof auth.currentUser==='function') return auth.currentUser(); }catch(_){ } return null; }
      async function updateSessionBox(){ var nameEl=document.getElementById('vscCurrentUserName'), roleEl=document.getElementById('vscCurrentUserRole'); if(!nameEl||!roleEl) return; var user=null; try{ user=await getCurrentUserSafe(); }catch(_){ user=null; } if(!user){ try{ user=JSON.parse((getTopLocalStorage()||localStorage).getItem('vsc_user')||'null'); }catch(_){ user=null; } } nameEl.textContent=user&&(user.nome||user.name||user.usuario||user.username||user.email)?(user.nome||user.name||user.usuario||user.username||user.email):'Não autenticado'; roleEl.textContent=user&&(user.perfil||user.role||user.tipo)?(user.perfil||user.role||user.tipo):'Sem sessão'; }
      function safeTopReplace(url){ try{ getTopWindow().location.replace(url); return true; }catch(_){ } try{ location.replace(url); return true; }catch(_){ } return false; }
      async function handleLogout(){ var btn=document.getElementById('vscLogoutBtn'); if(!btn||btn.disabled) return; var auth=getAuthApi(); var prev=btn.textContent; btn.disabled=true; btn.textContent='Saindo...'; setLogoutInProgress(); try{ if(auth&&typeof auth.logout==='function'){ await auth.logout(); } else { try{ (getTopLocalStorage()||localStorage).removeItem('vsc_session_id'); }catch(_){ } try{ (getTopLocalStorage()||localStorage).removeItem('vsc_user'); }catch(_){ } } }catch(e){ console.error('[VSC_TOPBAR] falha no logout',e); } clearLogoutInProgress(); safeTopReplace(isPagesHost()?LOGIN_TARGET_CLEAN:LOGIN_TARGET); btn.textContent=prev; btn.disabled=false; }
      function bindLogout(id){ var el=document.getElementById(id); if(el) el.addEventListener('click', function(ev){ ev.preventDefault(); handleLogout(); }); }
      function updatePending(n){ ['vscSyncPending','vscMobilePending'].forEach(function(id){ var el=document.getElementById(id); if(el) el.textContent=String(Number(n||0)); }); }
      function bindSync(id){ var el=document.getElementById(id); if(!el||el.__vscSyncBound) return; el.__vscSyncBound=true; el.addEventListener('click', async function(ev){ try{
        if(ev){ ev.preventDefault(); ev.stopPropagation(); }
        var ui=(window.VSC_SYNC_UI||getTopWindow().VSC_SYNC_UI||null);
        if(ui&&typeof ui.openOfficialPanel==='function'){
          var opened=await ui.openOfficialPanel(getTopWindow());
          if(opened) return;
        }
        var p=getTopWindow();
        if(p&&p!==window){ try{ p.postMessage({ type:'VSC_SYNC_PANEL_OPEN' }, '*'); }catch(_){} return; }
        if(window.VSC_SYNC_PANEL&&typeof window.VSC_SYNC_PANEL.open==='function'){ window.VSC_SYNC_PANEL.open(); return; }
      }catch(_){ } }); }
      function postHeight(h){ try{ window.parent && window.parent.postMessage({ type:'VSC_TOPBAR_HEIGHT', height:h }, '*'); }catch(_){ } }
      function closeMenu(){ document.body.classList.remove('mobile-open'); postHeight(window.innerWidth<=900?MOBILE_H:DESKTOP_H); }
      function toggleMenu(){ var open=!document.body.classList.contains('mobile-open'); document.body.classList.toggle('mobile-open', open); postHeight(open ? Math.min(360, document.documentElement.scrollHeight) : (window.innerWidth<=900?MOBILE_H:DESKTOP_H)); }
      function setupMobileToggle(){ var btn=document.getElementById('vscMobileToggle'); if(btn) btn.addEventListener('click', toggleMenu); }
      function onProgress(ev){ var d=(ev&&ev.detail)||{}; updatePending(d.pending||0); }
      async function boot(){ upgradeCanonicalLinks(); wireNav(document.getElementById('vscTopbarNav')); wireNav(document.getElementById('vscMobileNav')); setActiveFromCurrentContext(); await loadLogoA(); await updateSessionBox(); bindLogout('vscLogoutBtn'); bindLogout('vscMobileLogoutBtn'); bindSync('vscSyncBtn'); bindSync('vscMobileSyncBtn'); setupMobileToggle(); window.addEventListener('storage', function(ev){ if(!ev) return; if(ev.key===EMPRESA_KEY) loadLogoA(); if(ev.key==='vsc_user'||ev.key==='vsc_session_id') updateSessionBox(); setActiveFromCurrentContext(); }); window.addEventListener('message', function(ev){ var data=ev&&ev.data; if(!data||typeof data!=='object') return; if(data.type==='VSC_NAV_UPDATE') setActiveFromCurrentContext(); if(data.type==='VSC_BRANDING_UPDATE') loadLogoA(); if(data.type==='VSC_SESSION_UPDATE') updateSessionBox(); }); window.addEventListener('vsc:sync-progress', onProgress); window.addEventListener('vsc:empresa-updated', function(){ loadLogoA(); }); postHeight(window.innerWidth<=900?MOBILE_H:DESKTOP_H); }
      if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot, {once:true}); else boot();
    })();
  </script>

  <script>
    // ── VSC Sync Panel Loader: injeta o painel na página pai ────────────
    (function() {
      function _loadPanelInParent() {
        try {
          var p = window.parent;
          if (!p || p === window) return;
          if (p.VSC_SYNC_PANEL) return; // já carregado
          var s = p.document.createElement('script');
          s.src = '/modules/vsc-sync-panel.js';
          s.onload = function() { console.log('[VSC] Sync Panel carregado.'); };
          p.document.head.appendChild(s);
        } catch(_) {}
      }
      setTimeout(_loadPanelInParent, 800);
      window.addEventListener('message', function(ev) {
        if (ev.data && ev.data.type === 'VSC_SYNC_PANEL_OPEN') {
          try { window.parent.VSC_SYNC_PANEL && window.parent.VSC_SYNC_PANEL.open(); } catch(_) {}
        }
      });
    })();

    // ── VSC Bridge: expõe VSC_DB e VSC_AUTH para a página pai ──────────
    (function() {
      function _bridge() {
        try {
          var p = window.parent;
          if (!p || p === window) return;
          if (window.VSC_DB && typeof window.VSC_DB.openDB === 'function') {
            p.VSC_DB = window.VSC_DB;
          }
          if (window.VSC_AUTH && typeof window.VSC_AUTH.getCurrentUser === 'function') {
            p.VSC_AUTH = window.VSC_AUTH;
          }
          if (window.VSC_RELAY) p.VSC_RELAY = window.VSC_RELAY;
          if (window.VSC_CLOUD_SYNC) p.VSC_CLOUD_SYNC = window.VSC_CLOUD_SYNC;
        } catch(_) {}
      }

      // Expor imediatamente se já disponível
      _bridge();

      // Expor quando DB ficar pronto
      window.addEventListener('vsc:db:ready', _bridge);
      window.addEventListener('VSC_AUTH_READY', _bridge);

      // Fallback: polling curto
      var _tries = 0;
      var _t = setInterval(function() {
        _bridge();
        _tries++;
        if (_tries >= 20) clearInterval(_t);
      }, 300);
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Acesso suspenso - Vet System Control | Equine</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="stylesheet" href="modules/vsc-ui.css?v=20260307f" />
  <link rel="stylesheet" href="assets/css/vsc-premium-enterprise.css" />
<script src="modules/app.js" charset="utf-8"></script>
  <script src="modules/vsc_db.js" charset="utf-8"></script>
  <script src="modules/auth.js" charset="utf-8"></script>
  <script src="modules/auth_guard.js" charset="utf-8"></script>
  <script src="modules/subscription.js" charset="utf-8"></script>

  <style>
    :root{ --green:#2fb26a; --muted:#6b7280; --bg:#f7f8fa; --danger:#e11d48; }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:#111; }
    .wrap{ max-width:820px; margin:0 auto; padding:28px 18px 80px; }
    .card{ background:#fff; border:1px solid rgba(0,0,0,.06); border-radius:18px; box-shadow:0 2px 0 rgba(0,0,0,.04); padding:18px; }
    .h1{ margin:6px 0 8px; font-weight:900; font-size:22px; }
    .p{ margin:0; color:var(--muted); font-weight:800; line-height:1.45; }
    .pill{ display:inline-flex; align-items:center; gap:8px; font-size:12px; font-weight:900; border:1px solid rgba(225,29,72,.35); border-radius:999px; padding:6px 10px; background:rgba(225,29,72,.10); }
    .row{ display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
    .btn{ border:1px solid rgba(0,0,0,.12); background:#fff; color:#111; font-weight:900; border-radius:12px; padding:10px 12px; cursor:pointer; box-shadow:0 2px 0 rgba(0,0,0,.04); }
    .btn--primary{ border-color:rgba(47,178,106,.35); background:rgba(47,178,106,.12); }
    .mini{ margin-top:14px; font-size:12px; color:var(--muted); font-weight:800; }
    code{ background:rgba(0,0,0,.05); padding:2px 6px; border-radius:8px; }
  
    /* ─── Topbar (Oficial) ──────────────────────────────────────────────────── */
    #vscTopbarFrame { width: 100%; height: 86px; border: 0; display: block; background: #fff; }
    .topbar, .top-bar, header.topbar, header.top-bar,
    #topbar, #topBar, #headerTopbar { display: none !important; }
    body { margin-top: 0 !important; }
</style>
</head>
<body class="vsc-premium">
<iframe id="vscTopbarFrame" src="topbar.html?v=20260307f" title="Navegação"></iframe>

  <div class="wrap">
    <div class="card">
      <div class="pill">⛔ Assinatura suspensa</div>
      <div class="h1">Acesso temporariamente indisponível</div>
      <p class="p">
        Sua assinatura está em situação de suspensão. Para reativar, regularize a mensalidade com o responsável.
      </p>

      <div class="row">
        <button class="btn btn--primary" id="btnTryAgain">Tentar novamente</button>
        <button class="btn" id="btnLogout">Sair</button>
      </div>

      <div class="mini" id="miniInfo"></div>
    </div>
  </div>

<script>
(async function(){
  "use strict";

  function qs(k){ try{ return new URLSearchParams(location.search).get(k); }catch(_){ return null; } }
  function setMini(t){ var el=document.getElementById('miniInfo'); if(el) el.textContent = t || ''; }

  try{
    if(window.VSC_AUTH && typeof VSC_AUTH.bootstrap === 'function'){
      await VSC_AUTH.bootstrap();
    }
  }catch(_e){}

  try{
    if(window.VSC_SUBSCRIPTION && typeof VSC_SUBSCRIPTION.ensureDefault === 'function'){
      const sub = await VSC_SUBSCRIPTION.ensureDefault();
      const st = (sub && sub.status) ? sub.status : 'UNKNOWN';
      const due = sub && sub.next_due_at ? sub.next_due_at : null;
      setMini('Status: ' + st + (due ? (' · Próximo vencimento: ' + due) : ''));
    }
  }catch(_e2){}

  var btnTry = document.getElementById('btnTryAgain');
  if(btnTry) btnTry.addEventListener('click', function(){
    var next = qs('next');
    if(next){ try{ location.href = decodeURIComponent(next); return; }catch(_){ } }
    location.href = 'dashboard.html';
  });

  var btnOut = document.getElementById('btnLogout');
  if(btnOut) btnOut.addEventListener('click', async function(){
    try{ if(window.VSC_AUTH && typeof VSC_AUTH.logout === 'function') await VSC_AUTH.logout(); }catch(_e){}
    location.href = 'login.html';
  });
})();
</script>
  <script src="modules/ui-global.js"></script>
</body>
</html>

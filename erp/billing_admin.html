<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Billing Admin (DEV) - Vet System Control | Equine</title>

  <link rel="stylesheet" href="/assets/styles.css" />

  <script src="modules/app.js" charset="utf-8"></script>
  <script src="modules/vsc_db.js" charset="utf-8"></script>
  <script src="modules/auth.js" charset="utf-8"></script>
  <script src="modules/auth_guard.js" charset="utf-8"></script>

  <script src="modules/subscription.js" charset="utf-8"></script>

  <style>
    :root{ --green:#2fb26a; --muted:#6b7280; --bg:#f7f8fa; --danger:#e11d48; --warn:#f59e0b; }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:#111; }
    .wrap{ max-width:980px; margin:0 auto; padding:22px 18px 70px; }
    .h1{ font-size:24px; font-weight:900; margin:10px 0 6px; }
    .sub{ margin:0 0 14px; color:var(--muted); font-weight:800; font-size:13px; }
    .card{ background:#fff; border:1px solid rgba(0,0,0,.06); border-radius:18px; box-shadow:0 2px 0 rgba(0,0,0,.04); overflow:hidden; margin-top:12px; }
    .head{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 14px 10px; border-bottom:1px solid rgba(0,0,0,.06); }
    .title{ font-weight:900; font-size:14px; }
    .pill{ display:inline-flex; align-items:center; gap:8px; font-size:12px; font-weight:900; border:1px solid rgba(0,0,0,.10); border-radius:999px; padding:6px 10px; background:rgba(0,0,0,.02); }
    .pill--ok{ border-color:rgba(47,178,106,.35); background:rgba(47,178,106,.12); }
    .pill--warn{ border-color:rgba(245,158,11,.35); background:rgba(245,158,11,.12); }
    .pill--danger{ border-color:rgba(225,29,72,.35); background:rgba(225,29,72,.10); }
    .body{ padding:14px; }
    .grid{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    @media(max-width:820px){ .grid{ grid-template-columns:1fr; } }
    label{ display:block; font-size:12px; font-weight:900; margin-bottom:6px; }
    input, select{ width:100%; box-sizing:border-box; border:1px solid rgba(0,0,0,.14); border-radius:12px; padding:11px 12px; font-size:14px; outline:none; background:#fff; }
    input:focus, select:focus{ border-color:rgba(47,178,106,.55); box-shadow:0 0 0 4px rgba(47,178,106,.12); }
    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:12px; }
    .btn{ border:1px solid rgba(0,0,0,.12); background:#fff; color:#111; font-weight:900; border-radius:12px; padding:10px 12px; cursor:pointer; box-shadow:0 2px 0 rgba(0,0,0,.04); }
    .btn--primary{ border-color:rgba(47,178,106,.35); background:rgba(47,178,106,.12); }
    .btn--danger{ border-color:rgba(225,29,72,.35); background:rgba(225,29,72,.10); }
    .msg{ margin-top:12px; border-radius:14px; padding:12px 12px; border:1px solid rgba(0,0,0,.10); font-weight:800; font-size:13px; display:none; }
    .msg--ok{ display:block; border-color:rgba(47,178,106,.35); background:rgba(47,178,106,.12); }
    .msg--danger{ display:block; border-color:rgba(225,29,72,.35); background:rgba(225,29,72,.10); }
    .mini{ margin-top:12px; font-size:12px; color:var(--muted); font-weight:800; }
    code{ background:rgba(0,0,0,.05); padding:2px 6px; border-radius:8px; }
  
    /* ─── Topbar (Oficial) ──────────────────────────────────────────────────── */
    #vscTopbarFrame { width: 100%; height: 86px; border: 0; display: block; background: #fff; }
    .topbar, .top-bar, header.topbar, header.top-bar,
    #topbar, #topBar, #headerTopbar { display: none !important; }
    body { margin-top: 0 !important; }
</style>
</head>
<body>
<iframe id="vscTopbarFrame" src="topbar.html?v=final" title="Navegação"></iframe>

  <div class="wrap">
    <div class="h1">Billing Admin (DEV)</div>
    <p class="sub">Módulo oculto (somente desenvolvedor/operador). Não deve ser exposto a assinantes.</p>

    <div class="card">
      <div class="head">
        <div class="title">Status da assinatura (tenant)</div>
        <div class="pill" id="pillStatus">—</div>
      </div>
      <div class="body">
        <div class="grid">
          <div>
            <label>Plano (plan_id)</label>
            <input id="planId" placeholder="PLAN_DEFAULT" />
          </div>
          <div>
            <label>Status</label>
            <select id="statusSel">
              <option value="ACTIVE">ACTIVE</option>
              <option value="PAST_DUE">PAST_DUE</option>
              <option value="GRACE">GRACE</option>
              <option value="SUSPENDED">SUSPENDED</option>
              <option value="CANCELED">CANCELED</option>
            </select>
          </div>
          <div>
            <label>Próximo vencimento (next_due_at) — ISO</label>
            <input id="nextDue" placeholder="2026-03-10" />
          </div>
          <div>
            <label>Carência (dias) — aplica GRACE</label>
            <input id="graceDays" type="number" min="0" step="1" placeholder="0" />
          </div>
        </div>

        <div class="row">
          <button class="btn btn--primary" id="btnSalvar">Salvar</button>
          <button class="btn" id="btnMarkPaid">Marcar como pago (ACTIVE)</button>
          <button class="btn btn--danger" id="btnSuspender">Suspender agora</button>
        </div>

        <div class="msg" id="msgBox"></div>

        <div class="mini">
          Gate DEV: exige <code>role_master</code> e <code>localStorage.vsc_dev_mode = "1"</code>.
        </div>
      </div>
    </div>
  </div>

  <script src="modules/billing_admin.js" charset="utf-8"></script>
</body>
</html>

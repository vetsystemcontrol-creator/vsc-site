<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Animais (Demo) — Vet System Control | Equine</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="/" aria-label="Vet System Control – Equine">
        <span class="brand__logo-wrap">
          <span class="brand__logo-bg">
            <img src="/assets/img/vsc-logo-horizontal.png" alt="Vet System Control | Equine">
          </span>
        </span>
      </a>
      <nav class="nav" aria-label="Navegação principal">
        <a href="/recursos.html">Recursos</a>
        <a href="/sobre.html">Sobre</a>
        <a href="/contato.html">Contato</a>
        <a class="btn btn--ghost" href="/login.html">Acessar</a>
      </nav>
      <button class="nav__toggle" type="button" aria-label="Abrir menu" aria-expanded="false" data-nav-toggle>
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="vsc-demo-page">
    <div class="vsc-demo-hero">
      <div>
        <h1>Animais (DEMO)</h1>
        <p>Esta é uma demonstração visual (dados fictícios). Para operar o sistema de verdade, faça login.</p>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <a class="btn btn--ghost" href="/">Voltar ao site</a>
        <button class="btn btn--primary" type="button" data-open-login>Acessar sistema real</button>
      </div>
    </div>

    <div class="vsc-demo-shotframe"><iframe src="/erp/animais.html?demo=1" title="animais (DEMO)" loading="lazy"></iframe></div>
  </main>

  <div class="vsc-modal" id="vscLoginModal" aria-hidden="true">
    <div class="vsc-modal__box" role="dialog" aria-modal="true" aria-labelledby="vscModalTitle">
      <div class="vsc-modal__head">
        <div class="vsc-modal__title" id="vscModalTitle">Acessar o sistema</div>
        <button class="vsc-btn ghost" type="button" data-close-login aria-label="Fechar">×</button>
      </div>
      <div class="vsc-modal__body">
        <p>Esta página é apenas demonstração visual. Para usar o sistema completo, você precisa entrar com suas credenciais.</p>
      </div>
      <div class="vsc-modal__actions">
        <button class="vsc-btn ghost" type="button" data-close-login>Continuar na demo</button>
        <button class="vsc-btn primary" type="button" data-go-real>Ir para o login</button>
      </div>
    </div>
  </div>

  <script>
    window.VSC_APP_URL = "https://app.vetsystemcontrol.com.br";
    (function(){
      const m = document.getElementById("vscLoginModal");
      const open = ()=>{ m.classList.add("open"); m.setAttribute("aria-hidden","false"); };
      const close = ()=>{ m.classList.remove("open"); m.setAttribute("aria-hidden","true"); };
      document.addEventListener("click", (ev)=>{
        const t = ev.target;
        if(t && t.closest("[data-open-login]")){ ev.preventDefault(); open(); }
        if(t && t.closest("[data-close-login]")){ ev.preventDefault(); close(); }
        if(t === m){ close(); }
        if(t && t.closest("[data-go-real]")){ window.location.href = window.VSC_APP_URL + "/login"; }
      }, true);
    })();
  </script>
  <script src="/assets/js/main.js" defer></script>
</body>
</html>

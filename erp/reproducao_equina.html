<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reprodução Equina - Vet System Control | Equine</title>

  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="icon" href="data:,">

  <!-- JS CANÔNICO -->
  <script src="modules/app.js" charset="utf-8"></script>
  <script src="modules/enter-nav.js" charset="utf-8"></script>
  <script src="modules/vsc-topbar.js" charset="utf-8"></script>
  <script src="modules/vsc_db.js" charset="utf-8"></script>
  
  <script src="modules/auth.js" charset="utf-8"></script>
  <script src="modules/auth_guard.js" charset="utf-8"></script>
<script defer src="modules/reproducao_equina.js" charset="utf-8"></script>

  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #6366f120;
      --muted: #6b7280;
      --border: #e5e7eb;
      --surface: #f8fafc;
      --bg: #f1f5f9;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: #0f172a;
    }

    #vscTopbarFrame {
      width: 100%;
      height: 86px;
      border: 0;
      display: block;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 9999;
    }

    .page-wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px 20px 60px;
    }

    /* === HEADER === */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 4px;
    }

    .page-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .page-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .page-title {
      font-size: 26px;
      font-weight: 900;
      margin: 0 0 2px;
      line-height: 1.1;
    }

    .page-sub {
      font-size: 13px;
      color: var(--muted);
    }

    /* === CARDS === */
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }

    /* === BUTTONS === */
    .btn {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 10px;
      padding: 9px 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.15s;
    }

    .btn:hover { background: var(--surface); }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn-primary:hover {
      background: #4f46e5;
      border-color: #4f46e5;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* === LOADING === */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
      font-size: 15px;
      color: var(--muted);
      gap: 12px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* === RESPONSIVE === */
    @media (max-width: 640px) {
      .page-wrap { padding: 12px 12px 48px; }
      .page-title { font-size: 20px; }
    }
  </style>
</head>

<body>
  <!-- TOPBAR OFICIAL (CANÔNICO) -->
  <iframe id="vscTopbarFrame"
          src="topbar.html?v=final"
          title="Topbar — Vet System Control | Equine"
          style="width:100%;height:86px;border:0;display:block;position:sticky;top:0;z-index:9999;background:#fff;"
          loading="eager"></iframe>

  <div class="page-wrap">
    <!-- Cabeçalho da Página -->
    <div class="page-header">
      <div class="page-header-left">
        <div class="page-icon">🐎</div>
        <div>
          <div class="page-title">Reprodução Equina</div>
          <div class="page-sub">Controle reprodutivo · IA · TE · Gestação · Parto · Offline-first</div>
        </div>
      </div>
    </div>

    <!-- Corpo dinâmico do módulo -->
    <div id="reproRoot" style="margin-top:12px;">
      <div class="loading-state">
        <div class="spinner"></div>
        Carregando módulo reprodutivo...
      </div>
    </div>
  </div>

  <script>
    // Aguarda vsc_db estar pronto e inicializa o módulo
    (function initRepro() {
      let attempts = 0;
      function tryInit() {
        attempts++;
        if (window.VSC_DB && window.REPRO) {
          window.REPRO.init().catch(err => {
            console.error("[REPRO] Erro na inicialização:", err);
            document.getElementById("reproRoot").innerHTML =
              `<div style="padding:40px;text-align:center;color:#dc2626;">
                <div style="font-size:36px;margin-bottom:12px;">⚠️</div>
                <div style="font-weight:700;">Erro ao carregar módulo</div>
                <div style="font-size:13px;margin-top:8px;color:#6b7280;">${err.message || String(err)}</div>
                <button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;border:none;background:#6366f1;color:#fff;border-radius:8px;cursor:pointer;font-weight:700;">Recarregar</button>
              </div>`;
          });
          return;
        }
        if (attempts < 80) {
          setTimeout(tryInit, 100);
        } else {
          document.getElementById("reproRoot").innerHTML =
            `<div style="padding:40px;text-align:center;color:#dc2626;">Tempo esgotado ao carregar dependências. <button onclick="location.reload()">Recarregar</button></div>`;
        }
      }
      tryInit();
    })();
  </script>
</body>
</html>

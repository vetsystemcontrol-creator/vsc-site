<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Vet System Control – Equine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="manifest" href="/manifest.webmanifest">
  <script src="modules/vsc_db.js" charset="utf-8"></script>
  <script src="modules/auth.js" charset="utf-8"></script>
  <script src="modules/auth_guard.js" charset="utf-8"></script>
  <style>
    :root{color-scheme:light}
    body{min-height:100vh;display:grid;place-items:center;margin:0;padding:24px;background:#f5f7fb;color:#18212f;font:500 16px/1.45 Arial,sans-serif}
    .entry-card{width:min(520px,100%);background:#fff;border:1px solid rgba(24,33,47,.08);border-radius:18px;box-shadow:0 18px 54px rgba(16,24,40,.08);padding:28px}
    h1{margin:0 0 8px;font-size:22px}
    p{margin:0;color:#4a5565}
    .entry-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:12px;text-decoration:none;font-weight:700}
    .btn-primary{background:#123d6b;color:#fff}
    .btn-secondary{background:#eef2f8;color:#123d6b}
  </style>
</head>
<body>
  <main class="entry-card" aria-live="polite">
    <h1>Acesso ao Vet System Control</h1>
    <p>Verificando sessão local e redirecionando para a tela correta.</p>
    <div class="entry-actions">
      <a class="btn btn-primary" href="login.html">Ir para o login</a>
      <a class="btn btn-secondary" href="dashboard.html">Ir para o dashboard</a>
    </div>
  </main>
  <script>
    (function(){
      try{
        const sid = localStorage.getItem('vsc_session_id');
        location.replace(sid ? 'dashboard.html' : 'login.html');
      }catch(_){
        location.replace('login.html');
      }
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function(){ navigator.serviceWorker.register('/sw.js').catch(function(){}); });
    }
  </script>
</body>
</html>

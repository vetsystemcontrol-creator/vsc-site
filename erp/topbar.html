<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <base href="/" />
  <title>Topbar – VSC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #2FB379;
      --green-dark: #259a63;
      --white: #fff;
      --bg: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
    }
    html, body { height: 86px; overflow: hidden; background: #fff; }

    .topbar {
      display: flex;
      align-items: center;
      height: 86px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      gap: 12px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .topbar__logo {
      height: 38px;
      width: auto;
      cursor: pointer;
      flex-shrink: 0;
    }

    .topbar__nav {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .topbar__nav::-webkit-scrollbar { display: none; }

    .topbar__nav a {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
      transition: background .15s, color .15s;
    }
    .topbar__nav a:hover { background: #f1f5f9; color: var(--text); }
    .topbar__nav a.active { background: #ecfdf5; color: var(--green-dark); }
    .topbar__nav a .ico { font-size: 14px; }

    .topbar__right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .topbar__user {
      font-size: 12px;
      color: var(--muted);
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .topbar__logout {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .topbar__logout:hover { border-color: #ef4444; color: #ef4444; }

    .topbar__hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      font-size: 22px;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      .topbar__nav { display: none; }
      .topbar__hamburger { display: flex; }
      .topbar__nav.open {
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 86px; left: 0; right: 0;
        background: #fff;
        border-bottom: 1px solid var(--border);
        padding: 10px;
        z-index: 9999;
        box-shadow: 0 8px 24px rgba(0,0,0,.1);
      }
    }
  </style>
</head>

<script>
(function(){
  // Mark active nav link based on parent window pathname
  function markActive(){
    try{
      var p = (parent.location.pathname || "").toLowerCase().replace(/\.html$/, "").replace(/\/$/, "");
      document.querySelectorAll(".nav-link").forEach(function(a){
        var href = (a.getAttribute("href") || "").toLowerCase().replace(/\.html$/, "");
        a.classList.toggle("active", href === p);
      });
    }catch(_){}
  }

  // Show logged-in user
  function showUser(){
    try{
      var sid = localStorage.getItem("vsc_session_id");
      if(!sid){ document.getElementById("userLabel").textContent = ""; return; }
      // Try to get username from VSC_AUTH if available in parent
      try{
        if(parent.VSC_AUTH && typeof parent.VSC_AUTH.getCurrentUser === "function"){
          parent.VSC_AUTH.getCurrentUser().then(function(u){
            if(u && u.username) document.getElementById("userLabel").textContent = u.username;
          }).catch(function(){});
        }
      }catch(_){}
    }catch(_){}
  }

  // Logout
  document.getElementById("btnLogout").addEventListener("click", function(){
    try{
      if(parent.VSC_AUTH && typeof parent.VSC_AUTH.logout === "function"){
        parent.VSC_AUTH.logout().then(function(){
          parent.location.replace("/login");
        }).catch(function(){
          localStorage.removeItem("vsc_session_id");
          parent.location.replace("/login");
        });
      } else {
        localStorage.removeItem("vsc_session_id");
        parent.location.replace("/login");
      }
    }catch(_){
      try{ localStorage.removeItem("vsc_session_id"); }catch(__){ }
      try{ parent.location.replace("/login"); }catch(__){ location.replace("/login"); }
    }
  });

  // Hamburger menu
  document.getElementById("btnMenu").addEventListener("click", function(){
    document.getElementById("navLinks").classList.toggle("open");
  });

  // Nav clicks navigate parent window
  document.querySelectorAll(".nav-link").forEach(function(a){
    a.addEventListener("click", function(e){
      e.preventDefault();
      try{
        parent.location.href = a.getAttribute("href");
        document.getElementById("navLinks").classList.remove("open");
      }catch(_){ location.href = a.getAttribute("href"); }
    });
  });

  markActive();
  showUser();

  // Listen for parent navigation to update active state
  try{
    parent.addEventListener("popstate", markActive);
  }catch(_){}
})();
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <!-- Base fixa para compatibilidade com /login e /dashboard (Pretty URLs) -->
  <base href="/" />
  <title>Login - Vet System Control | Equine</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <style>
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{width:100%;max-width:520px;background:#fff;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:22px;}
    .h{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
    .logo{font-size:34px;line-height:1;}
    h1{margin:0;font-size:20px;}
    p{margin:6px 0 0;color:#555;font-size:13px;line-height:1.4}
    .row{margin-top:14px;}
    label{display:block;font-size:12px;color:#333;margin-bottom:6px;font-weight:600;}
    select,input{width:100%;padding:10px 12px;border:1px solid #d6d6d6;border-radius:10px;font-size:14px;}
    input:focus,select:focus{outline:none;border-color:#2e7d32;box-shadow:0 0 0 3px rgba(46,125,50,.12);}
    .actions{display:flex;gap:10px;align-items:center;margin-top:16px;}
    button{cursor:pointer;border:0;border-radius:10px;padding:10px 14px;font-weight:700}
    .btn{background:#2e7d32;color:#fff;}
    .hint{margin-top:10px;font-size:12px;color:#666;}
    .status{margin-top:12px;font-size:12px;padding:10px 12px;border-radius:10px;border:1px solid #eee;background:#fafafa;}
    .status.ok{border-color:rgba(46,125,50,.35);background:rgba(46,125,50,.06);}
    .status.warn{border-color:rgba(255,152,0,.35);background:rgba(255,152,0,.06);}
    .status.error{border-color:rgba(211,47,47,.35);background:rgba(211,47,47,.06);}
    .status.info{border-color:rgba(2,119,189,.35);background:rgba(2,119,189,.06);}
    .small{font-size:11px;color:#777;margin-top:10px;line-height:1.35}
    .small code{background:#f2f2f2;border-radius:6px;padding:2px 6px;}
  </style><script src="/modules/vsc_db.js" charset="utf-8" defer></script>
  <script src="/modules/auth.js" charset="utf-8" defer></script>
  <script src="/modules/login.js" charset="utf-8" defer></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="h">
        <div class="logo">🐴</div>
        <div>
          <h1>Vet System Control – Equine</h1>
          <p>Login obrigatório (offline-first). Sessão local com expiração.</p>
        </div>
      </div>

      <div class="row">
        <label for="username">Usuário</label>
        <select id="username">
          <option value="">Selecione...</option>
        </select>
      </div>

      <div class="row">
        <label for="password">Senha</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="Digite sua senha" />
      </div>

      <div class="actions">
        <button id="btnLogin" class="btn" type="button">Entrar</button>
        <button id="btnRecover" type="button" title="Recuperar acesso (apenas ambiente local)">Recuperar acesso</button>
      </div>

      <div id="loginStatus" class="status info">Carregando…</div>

      <div class="small">
        <div><b>Primeiro acesso (DB vazio):</b> o sistema cria <code>master</code> (MASTER) com senha temporária exibida UMA vez no Console (F12).</div>
        <div>Depois do login, altere a senha em <code>Configurações → Usuários</code>.</div>
      </div>
    </div>
  </div>
</body>
</html>

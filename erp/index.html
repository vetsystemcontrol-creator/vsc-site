<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Vet System Control – Equine</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="modules/vsc_db.js" charset="utf-8"></script>
  <script src="modules/auth.js" charset="utf-8"></script>
  <script src="modules/auth_guard.js" charset="utf-8"></script>
<style>

    /* ─── Topbar (Oficial) ──────────────────────────────────────────────────── */
    #vscTopbarFrame { width: 100%; height: 86px; border: 0; display: block; background: #fff; }
    .topbar, .top-bar, header.topbar, header.top-bar,
    #topbar, #topBar, #headerTopbar { display: none !important; }
    body { margin-top: 0 !important; }

</style>
</head>
<body>
<script>
  // Entrada única (padrão enterprise): sempre decide login vs dashboard.
  (function(){
    try{
      const sid = localStorage.getItem("vsc_session_id");
      const isLogin = /(?:^|\/)(login\.html)$/i.test(location.pathname);
      const isDash  = /(?:^|\/)(dashboard\.html)$/i.test(location.pathname);
      if (!isLogin && !isDash){
        if (sid) location.replace("dashboard.html");
        else location.replace("login.html");
      }
    }catch(e){}
  })();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
  }
</script>

<body>
<iframe id="vscTopbarFrame" src="topbar.html?v=final" title="Navegação"></iframe>

  <h1>Vet System Control – Equine</h1>
  <p>Base limpa inicial do Vet System Control – Equine.</p>
</body>
</html>
